<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, 公主</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-orbs">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <main class="page home-page">
    <nav class="top-nav">
      <div class="brand">For You ♡</div>
      <a class="nav-link" href="letter.html">Open Letter</a>
    </nav>

    <section class="hero-card fade-in">
      <div class="text-side">
        <p class="eyebrow">i love u smmmm we're gonna be together soon</p>
        <h1>Happy Birthday, my pookie</h1>
        <p class="subtitle">
          I wish I could hand you these flowers in person today, but until then,
          me and my friend chat made this for u.
        </p>

        <div class="button-row">
          <a href="letter.html" class="primary-button">Read your letter</a>
          <button class="secondary-button" id="sparkleButton">Send birthday sparkles</button>
        </div>
      </div>

      <div class="flower-side">
        <div class="flower-frame floaty">
          <img src="birthday-bouquet.png" alt="A beautiful birthday bouquet" />
        </div>
        <p class="caption">A bouquet for the prettiest birthday girl</p>
      </div>
    </section>

    <div class="photo-background" aria-hidden="true">
      <img class="bg-photo bg-photo-1" src="photo-1.png" alt="" />
      <img class="bg-photo bg-photo-2" src="photo-2.png" alt="" />
      <img class="bg-photo bg-photo-3" src="assets/photo-3.png" alt="" />
      <img class="bg-photo bg-photo-4" src="assets/photo-4.png" alt="" />
      <img class="bg-photo bg-photo-5" src="assets/photo-5.png" alt="" />
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
